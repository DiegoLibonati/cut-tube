services:
  cut-tube-app:
    build:
      context: ./cut-tube-app
      dockerfile: Dockerfile.production
    restart: always
    ports:
      - "80:80"
    env_file:
      - ./cut-tube-app/.env
    networks:
      - net-cut-tube
    depends_on:
      - cut-tube-api

  cut-tube-api:
    build:
      context: ./cut-tube-api
      dockerfile: Dockerfile.production
    restart: always
    expose:
      - "5050"
    env_file: ./cut-tube-api/.env
    networks:
      - net-cut-tube

networks:
  net-cut-tube:
    name: net-cut-tube
