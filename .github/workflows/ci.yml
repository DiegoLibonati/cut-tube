name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # BACKEND - runs first
  # ============================================================
  backend-lint-and-audit:
    name: Backend - Lint & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cut-tube-api

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version-file: cut-tube-api/.python-version
          cache: pip
          cache-dependency-path: cut-tube-api/pyproject.toml

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy --config-file=pyproject.toml .

      - name: pip-audit
        run: |
          pip-audit --skip-editable \
            --ignore-vuln GHSA-cfh3-3jmp-rvhc \
            --ignore-vuln GHSA-whj4-6x5x-4v2j \
            --ignore-vuln GHSA-wjx4-4jcj-g98j \
            --ignore-vuln GHSA-5xmw-vc9v-4wf2 \
            --ignore-vuln GHSA-r73j-pqj5-w3x7 \
            --ignore-vuln GHSA-pwv6-vv43-88gr

  backend-test:
    name: Backend - Testing
    runs-on: ubuntu-latest
    needs: backend-lint-and-audit
    defaults:
      run:
        working-directory: cut-tube-api

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version-file: cut-tube-api/.python-version
          cache: pip
          cache-dependency-path: cut-tube-api/pyproject.toml

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest --tb=short

  # ============================================================
  # FRONTEND - runs after backend
  # ============================================================
  frontend-lint-and-audit:
    name: Frontend - Lint & Audit
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: cut-tube-app

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: cut-tube-app/.nvmrc
          cache: npm
          cache-dependency-path: cut-tube-app/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend-test:
    name: Frontend - Testing
    runs-on: ubuntu-latest
    needs: frontend-lint-and-audit
    defaults:
      run:
        working-directory: cut-tube-app

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: cut-tube-app/.nvmrc
          cache: npm
          cache-dependency-path: cut-tube-app/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm run test

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: cut-tube-app

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: cut-tube-app/.nvmrc
          cache: npm
          cache-dependency-path: cut-tube-app/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

  # ============================================================
  # DOCKER - all four images in parallel, after everything
  # ============================================================
  docker-build:
    name: Docker Build - ${{ matrix.project }} ${{ matrix.tag }}
    runs-on: ubuntu-latest
    needs: frontend-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: cut-tube-api
            dockerfile: Dockerfile.development
            tag: cut-tube-api:dev
          - project: cut-tube-api
            dockerfile: Dockerfile.production
            tag: cut-tube-api:prod
          - project: cut-tube-app
            dockerfile: Dockerfile.development
            tag: cut-tube-app:dev
          - project: cut-tube-app
            dockerfile: Dockerfile.production
            tag: cut-tube-app:prod

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build ${{ matrix.project }}/${{ matrix.dockerfile }}
        uses: docker/build-push-action@v6.15.0
        with:
          context: ${{ matrix.project }}
          file: ${{ matrix.project }}/${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.tag }}
